name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - name: Download mpv
        shell: powershell
        run: |
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/2024-04-21/mpv-x86_64-20240421-git.7z"
          Invoke-WebRequest -Uri $url -OutFile mpv.7z

          if ((Get-Item mpv.7z).Length -lt 1000000) {
            Write-Error "mpv download failed"
            exit 1
          }

      - name: Extract mpv
        run: |
          7z x mpv.7z -ompv

      - name: Prepare mpv
        run: |
          mkdir resources
          mkdir resources\mpv
          xcopy mpv\* resources\mpv /E /I

      - name: Verify mpv exists
        shell: powershell
        run: |
          if (!(Test-Path "resources/mpv/mpv.exe")) {
            Write-Error "mpv missing"
            exit 1
          }

      - name: Build app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCropTool
          path: dist/*.exe
