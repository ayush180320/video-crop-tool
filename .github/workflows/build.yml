name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 🔥 4. Download mpv from YOUR GitHub release
      - name: Download mpv
        run: |
          curl -L -o mpv.7z https://github.com/ayush180320/video-crop-tool/releases/latest/download/mpv.7z

      # 🔍 5. Verify download (size should be ~20–40MB)
      - name: Verify mpv download
        run: |
          dir mpv.7z

      # 📦 6. Extract mpv
      - name: Extract mpv
        run: |
          7z x mpv.7z -ompv

      # 📁 7. Move into resources folder
      - name: Prepare mpv
        run: |
          mkdir resources
          mkdir resources\mpv
          xcopy mpv\* resources\mpv /E /I
          dir resources\mpv

      # 🛑 8. Fail if mpv missing
      - name: Verify mpv exists
        shell: powershell
        run: |
          if (!(Test-Path "resources/mpv/mpv.exe")) {
            Write-Error "mpv.exe missing"
            exit 1
          }

      # 🏗️ 9. Build app
      - name: Build app
        run: npm run build

      # 📦 10. Upload installer
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoCropTool
          path: dist/*.exe
