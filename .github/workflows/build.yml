name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      # ✅ REAL mpv build
      - name: Download mpv
        run: |
          curl -L -o mpv.7z https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/2024-04-21/mpv-x86_64-20240421-git.7z

      - name: Extract mpv
        run: |
          7z x mpv.7z -ompv

      - name: Prepare mpv
        run: |
          mkdir resources
          mkdir resources\mpv
          xcopy mpv\* resources\mpv /E /I

      # ✅ PowerShell-safe check
      - name: Verify mpv exists
        run: |
          if (!(Test-Path "resources/mpv/mpv.exe")) { exit 1 }

      - name: Build app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCropTool
          path: dist/*.exe
