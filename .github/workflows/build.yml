name: Build EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: VideoCropTool
          path: |
            dist/*.exe
            dist/*.blockmap
