name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      # 🔥 Download mpv (reliable)
      - name: Download mpv
        run: |
          curl -L -o mpv.zip https://sourceforge.net/projects/mpv-player-windows/files/latest/download

      # 🔥 Extract mpv
      - name: Extract mpv
        run: |
          7z x mpv.zip -ompv

      # 🔥 Create resources folder and copy mpv
      - name: Prepare mpv
        run: |
          mkdir resources
          mkdir resources\mpv
          xcopy mpv\* resources\mpv /E /I

      # 🔥 DEBUG (VERY IMPORTANT)
      - name: Verify mpv exists
        run: |
          dir resources\mpv

      # 🔥 FAIL SAFE (prevents broken build)
      - name: Fail if mpv missing
        run: |
          if not exist resources\mpv\mpv.exe exit 1

      - name: Build app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCropTool
          path: dist/*.exe
