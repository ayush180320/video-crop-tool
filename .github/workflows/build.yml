name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Download mpv (STABLE SOURCE)
      - name: Download mpv
        run: |
          curl -L -o mpv.zip https://sourceforge.net/projects/mpv-player-windows/files/latest/download

      # Extract mpv
      - name: Extract mpv
        run: |
          7z x mpv.zip -ompv

      # Move mpv into resources folder
      - name: Prepare mpv
        run: |
          mkdir resources\mpv
          xcopy mpv\* resources\mpv /E /I

      # Build app (NO publish errors anymore)
      - name: Build app
        run: npm run build

      # Upload installer
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoCropTool
          path: dist/*.exe
